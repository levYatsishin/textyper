<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const fallbackMode = "dark";
        try {
          const saved = localStorage.getItem("mathTyper.theme.v1");
          const mode = saved === "light" ? "light" : fallbackMode;
          document.documentElement.setAttribute("data-theme", mode);
          document.documentElement.style.colorScheme = mode;
        } catch {
          document.documentElement.setAttribute("data-theme", fallbackMode);
          document.documentElement.style.colorScheme = fallbackMode;
        }
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #1d2021;
        color: #d4be98;
      }

      html[data-theme="light"],
      html[data-theme="light"] body {
        background: #f9f5d7;
        color: #654735;
      }
    </style>
    <title>Math LaTeX Typer</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
